services:
  # ─── API Server (Express scraper backend) ───────────────────────────────────
  - type: web
    name: donghua-api
    runtime: node
    region: oregon
    # corepack is built into Node 16+; no sudo / global npm install needed
    buildCommand: corepack enable pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # ─── Frontend (Vite / React static site) ────────────────────────────────────
  - type: web
    name: donghua-frontend
    runtime: static
    buildCommand: corepack enable pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/donghua-stream run build
    staticPublishPath: ./artifacts/donghua-stream/dist
    envVars:
      - key: PORT
        value: 18837
      - key: BASE_PATH
        value: /
      # Set this to your Render API URL after the API service is deployed,
      # e.g. https://donghua-api.onrender.com
      - key: VITE_API_BASE_URL
        value: ""
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
